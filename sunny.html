<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-snap-type: y mandatory;
}

body {
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
    scroll-behavior: smooth;
}

/* PARTICLES */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* SECTION */
section {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 10%;
}

/* HERO */
.hero h1 {
    font-size: 90px;
    text-shadow: 0 0 20px #ff4d5a;
}

.hero h2 {
    color: #ff4d5a;
}

/* GLASS DARK */
.about, .projects {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff4d5a;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

/* FADE */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}
.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- HERO -->
<section class="hero">
    <p>I am</p>
    <h1 id="typing"></h1>
    <h2>Full Stack Developer</h2>
    <a href="#about" class="btn">Scroll</a>
</section>

<!-- ABOUT -->
<section id="about" class="about fade">
    <h2>About Me</h2>
    <p>Learning C++, DSA & Web Dev</p>
    <a href="#projects" class="btn">Next</a>
</section>

<!-- PROJECTS -->
<section id="projects" class="projects fade">
    <h2>Projects</h2>
    <p>My Work</p>
</section>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
/* ADVANCED PARTICLES (MATCHES THAT SITE STYLE) */
particlesJS("particles-js", {
  particles: {
    number: { value: 100 },
    color: { value: "#ffffff" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 120,
      color: "#ffffff",
      opacity: 0.2,
      width: 1
    },
    move: {
      enable: true,
      speed: 2,
      out_mode: "out"
    }
  },
  interactivity: {
    events: {
      onhover: {
        enable: true,
        mode: "grab"
      },
      onclick: {
        enable: true,
        mode: "repulse"
      }
    },
    modes: {
      grab: {
        distance: 140,
        line_linked: { opacity: 0.5 }
      },
      repulse: {
        distance: 100
      }
    }
  },
  retina_detect: true
});

/* TYPING */
const text = "SUNNY";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 120);
    }
}
type();

/* FADE */
const faders = document.querySelectorAll(".fade");
window.addEventListener("scroll", () => {
    faders.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add("show");
        }
    });
});
</script>

</body>
</html>
