<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sunny - Developer portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(31, 1, 29);
            color: white;

        }
        nav{
            display: flex;
            justify-content: space-around;
            align-items:center;
            height: 80px;
            background-color: rgb(105, 96, 102) ;

        }
        nav ul {
            display: flex;
            justify-content:center;
        }
        nav ul li{ 
            list-style: none;
            margin: 0 20px;
        }
        .left{
            font-size: 1.5rem;
        }
        .firstsection{
            display: flex;
            justify-content: space-around;
            margin: 23px 0;
        }
        .firstsection div {
            width: 30%;
        }

        .leftsection{
        background-color:  rgb(219, 10, 28);
        height: 20px;
        }
        
        .rightsection{
        background-color:  rgb(219, 10, 28);
        }

    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">sunny's portfolio</div>
            <div class="right">
                <ul>
                    <li>Home</li>
                    <li> About</li>
                    <li> Services</li>
                    <li>Projects</li>
                    <li>Contact Me</li>

                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="firstsection">
            <div class="leftsection">
                left
            </div>
            <div class="rightsection">
                right
            </div>

        </section>
    </main>

</body>

</html>
